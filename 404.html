nav{position:sticky;top:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;z-index:100}
.nav-logo img{height:36px;width:auto}
.nav-back{font-size:14px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s}
.nav-back:hover{color:var(--text)}
.page-hero{background:var(--black);padding:80px 48px 64px;text-align:center}
.page-hero h1{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,48px);font-weight:500;color:#fff;margin-bottom:12px}
.page-hero p{font-size:14px;color:rgba(255,255,255,.5)}
.page-body{max-width:760px;margin:0 auto;padding:64px 32px 100px}
h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;margin:40px 0 12px;color:var(--text)}
h2:first-child{margin-top:0}
p{font-size:15px;color:#444;margin-bottom:14px;line-height:1.75}
ul{margin:0 0 14px 20px}
li{font-size:15px;color:#444;margin-bottom:6px;line-height:1.7}
a{color:var(--text);text-decoration:underline;text-underline-offset:3px}
.last-updated{font-size:13px;color:var(--muted);margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--border)}
footer{background:#0a0a0a;padding:32px 48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
footer p{font-size:13px;color:rgba(255,255,255,.4)}
footer a{color:rgba(255,255,255,.4);text-decoration:none}
@media(max-width:600px){nav{padding:0 20px}.page-hero{padding:60px 24px 48px}.page-body{padding:40px 24px 80px}footer{padding:24px}}
</style>
<style>
.err-wrap{
  min-height:100svh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px 24px;
  background:var(--black);
}
.err-logo{height:48px;margin-bottom:48px;opacity:.8}
.err-num{
  font-family:'Playfair Display',serif;
  font-size:clamp(80px,18vw,160px);font-weight:400;
  color:rgba(255,255,255,.07);line-height:1;
  margin-bottom:-20px;
}
.err-title{font-family:'Playfair Display',serif;font-size:clamp(22px,4vw,36px);font-weight:500;color:#fff;margin-bottom:14px}
.err-msg{font-size:15px;color:rgba(255,255,255,.5);max-width:400px;line-height:1.7;margin-bottom:40px}
.err-links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.err-btn{
  padding:12px 28px;border-radius:100px;font-size:14px;font-weight:500;
  text-decoration:none;font-family:'DM Sans',sans-serif;transition:opacity .2s;
}
.err-primary{background:#d4af6e;color:#111}
.err-secondary{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15)}
.err-btn:hover{opacity:.85}
.err-marble{
  position:fixed;inset:0;z-index:-1;
  background:radial-gradient(ellipse at 30% 60%, rgba(180,150,80,.04) 0%, transparent 60%),
             radial-gradient(ellipse at 70% 30%, rgba(180,150,80,.03) 0%, transparent 50%);
}
</style>
</head>
<body>
<div class="err-marble"></div>
<div class="err-wrap">
  <img src="/logo-monogram-footer.png" srcset="/logo-monogram-footer.png 1x, /logo-monogram-footer@2x.png 2x" alt="Oxford Marble Specialist" class="err-logo" width="252" height="64">
  <p class="err-num">404</p>
  <h1 class="err-title">Page not found</h1>
  <p class="err-msg">The page you're looking for doesn't exist — it may have been moved or the link may be incorrect.</p>
  <div class="err-links">
    <a href="index.html" class="err-btn err-primary">Back to homepage</a>
    <a href="index.html#contact" class="err-btn err-secondary">Contact us</a>
  </div>
</div>
</body>
</html>
